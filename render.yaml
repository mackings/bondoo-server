services:
  - type: web
    name: bondoo-api
    runtime: node
    repo: https://github.com/mackings/bondoo-server
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BANK_BTC_ADDRESS
        sync: false
      - key: ESCROW_DEPOSIT_ADDRESS
        sync: false
      - key: MAILJET_API_KEY
        sync: false
      - key: MAILJET_API_SECRET
        sync: false
      - key: MAILJET_FROM_EMAIL
        sync: false
      - key: MAILJET_FROM_NAME
        value: BONDOO
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: BYBIT_TESTNET
        value: "false"
      - key: BYBIT_DRY_RUN
        value: "true"
